spring:
  application:
    name: order-service
  
  datasource:
    # Busca la URL de la nube; si no existe, levanta el PostgreSQL local de Docker
    url: ${DB_ORDER_URL:jdbc:postgresql://localhost:5432/order_db}
    username: ${DB_ORDER_USER:postgres}
    password: ${DB_ORDER_PASSWORD:postgres}
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Configuración de comunicación entre microservicios
services:
  inventory:
    # Permite cambiar la ruta dinámicamente al desplegar en Kubernetes/Cloud
    url: ${INVENTORY_SERVICE_URL:http://localhost:8082}